<!DOCTYPE html>
<html>
<head>
    <title>OTP Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        input { padding: 8px; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.6; }
        pre { background: #f0f0f0; padding: 10px; overflow: auto; max-height: 400px; }
        .form-group { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🧪 OTP System Test</h1>

    <form class="form-group" id="sendForm">
        <label>Email: <input type="email" id="email" value="test@example.com" required /></label>
        <button type="submit" id="btnSend">Send OTP</button>
    </form>

    <form class="form-group" id="verifyForm">
        <label>OTP: <input type="text" id="otp" required /></label>
        <button type="submit" id="btnVerify">Verify OTP</button>
    </form>

    <h2>Logs:</h2>
    <pre id="logs"></pre>

    <script>
        // Updated to port 3001 to match your backend environment configuration
        const API_URL = 'http://localhost:3001/api';

        function log(msg) {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logs.textContent += `[${timestamp}] ${msg}\n`;
            logs.scrollTop = logs.scrollHeight;
        }

        async function safeFetch(url, options) {
            const response = await fetch(url, options);
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                return { response, data: await response.json() };
            }
            throw new Error(`Server returned non-JSON response: ${response.status}`);
        }

        async function sendOTP() {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btnSend');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            log(`📧 Sending OTP to ${email}...`);

            try {
                const { response, data } = await safeFetch(`${API_URL}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok && data.success) {
                    log(`✅ SUCCESS: ${data.message}`);
                    if (data.data?.expiresIn) {
                        log(`⏱️  Expires in: ${data.data.expiresIn} seconds`);
                    }
                } else {
                    log(`❌ FAILED: ${data.message || 'Unknown error'}`);
                }
            } catch (err) {
                log(`❌ ERROR: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send OTP';
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const btn = document.getElementById('btnVerify');

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            const maskedOtp = otp.length > 2 ? `${otp.substring(0,2)}***` : '***';
            log(`🔐 Verifying OTP ${maskedOtp} for ${email}...`);

            try {
                const { response, data } = await safeFetch(`${API_URL}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                if (response.ok && data.success) {
                    log(`✅ SUCCESS: ${data.message}`);
                } else {
                    log(`❌ FAILED: ${data.message}`);
                }
            } catch (err) {
                log(`❌ ERROR: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify OTP';
            }
        }

        // Attach event listeners safely
        document.getElementById('sendForm').addEventListener('submit', function(e) {
            e.preventDefault();
            sendOTP();
        });

        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            verifyOTP();
        });

        log('🚀 OTP Test Page Ready');
        log(`📍 API URL: ${API_URL}`);
    </script>
</body>
</html>
